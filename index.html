<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Was esse ich heute?</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="layout">

        <div class="library-card">

            <h2> Meine Bibliothek</h2>

            <div id="libraryList">
                <p>Noch keine Rezepte gespeichert</p>
            </div>

        </div>

        <div class="container">
            <h1>🍽️ Was esse ich heute?</h1>

            <div class="ingredient-adder">
                <input id="input" placeholder="Zutat eingeben...">
                <button class="add-btn" onclick="addIngredient()">Hinzufügen</button>
            </div>

            <div id="selectedIngredients" class="selected-ingredients"></div>

            <div class="quick-select">
                <p class="quick-select-label">Schnellauswahl:</p>
                <div id="quickSelect" class="quick-chips"></div>
            </div>

            <button class="search-btn" onclick="search()">Rezepte finden</button>

            <ul id="results"></ul>
        </div>

        <div class="sidebar">
            <h2>🏆 Top Zutaten</h2>
            <ul id="topIngredients"></ul>
        </div>

        <div id="recipeModal" class="modal">

            <div class="modal-content">

                <span class="close-btn" onclick="closeModal()">
                    &times;
                </span>

                <div id="modalResults"></div>

            </div>

        </div>

        <!-- Rezept Popup -->
        <div id="recipeViewModal" class="modal">

            <div class="modal-content recipe-modal-content">

                <span class="close-btn" onclick="closeRecipeModal()">
                    &times;
                </span>

                <div id="recipeViewContent"></div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
