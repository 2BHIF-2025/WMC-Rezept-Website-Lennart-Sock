<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Was esse ich heute?</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="layout">

        <!-- Bibliothek -->
        <div class="library-card">

            <h2> Meine Bibliothek</h2>

            <div id="libraryList">
                <p>Noch keine Rezepte gespeichert</p>
            </div>

        </div>

        <div class="container">
            <h1>🍽️ Was esse ich heute?</h1>

            <input id="input" placeholder="z.B. reis, tomaten">
            <br>
            <button onclick="search()">Suchen</button>

            <ul id="results"></ul>
        </div>

        <div class="sidebar">
            <h2>🏆 Top Zutaten</h2>
            <ul id="topIngredients"></ul>
        </div>

        <div id="recipeModal" class="modal">

            <div class="modal-content">

                <span class="close-btn" onclick="closeModal()">
                    &times;
                </span>

                <div id="modalResults"></div>

            </div>

        </div>

        <!-- Rezept Popup -->
        <div id="recipeViewModal" class="modal">

            <div class="modal-content recipe-modal-content">

                <span class="close-btn" onclick="closeRecipeModal()">
                    &times;
                </span>

                <div id="recipeViewContent"></div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
